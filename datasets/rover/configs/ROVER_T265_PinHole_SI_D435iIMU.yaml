%YAML:1.0


# T265 Stereo PinHole + D435i IMU (cross-sensor Stereo-Inertial)
# Camera: T265 undistorted fisheye -> PinHole 640x480, 110° hFoV
# IMU: D435i built-in BMI055 (better AccWalk than T265: 0.0005 vs 0.012)


File.version: "1.0"

Camera.type: "PinHole"

# Left camera (T265 cam0, undistorted)
Camera1.fx: 224.07
Camera1.fy: 224.07
Camera1.cx: 320.00
Camera1.cy: 240.00

Camera1.k1: 0.0
Camera1.k2: 0.0
Camera1.p1: 0.0
Camera1.p2: 0.0

# Right camera (T265 cam1, undistorted)
Camera2.fx: 224.07
Camera2.fy: 224.07
Camera2.cx: 320.00
Camera2.cy: 240.00

Camera2.k1: 0.0
Camera2.k2: 0.0
Camera2.p1: 0.0
Camera2.p2: 0.0

Camera.width: 640
Camera.height: 480
Camera.fps: 30

Camera.RGB: 0

# T265 stereo extrinsics (unchanged)
Stereo.T_c1_c2: !!opencv-matrix
  rows: 4
  cols: 4
  dt: f
  data: [ 0.9999623927, -0.006993186493, -0.005129174805, -0.06347425524,
          0.006979568859,  0.9999720832,  -0.002668048862,  0.0004049468480,
          0.005147689778,  0.002632149095,  0.9999832864, -0.0009053657268,
          0.0, 0.0, 0.0, 1.0 ]

Stereo.ThDepth: 30.0
Stereo.b: 0.0635


# IMU params: D435i BMI055 (cross-sensor)
# transform: D435i_IMU -> T265_CamLeft via Prism frame
# computed: inv(T265_CamLeft_To_Prism) * D435i_Cam_To_Prism * D435i_IMU_To_Cam


IMU.T_b_c1: !!opencv-matrix
  rows: 4
  cols: 4
  dt: f
  data: [ 0.99995863, -0.00122243,  0.00901501, -0.22833763,
          0.00151622,  0.99946555, -0.03265444,  0.00336560,
         -0.00897028,  0.03266676,  0.99942605, -0.03627756,
          0.0, 0.0, 0.0, 1.0]

IMU.Frequency: 301.0
IMU.NoiseGyro:  0.0010662953470339657
IMU.NoiseAcc:   0.012204288735250874
IMU.GyroWalk:   5.776283991470186e-05
IMU.AccWalk:    0.0005354903138724063

IMU.fastInit: 1
IMU.insertKFsWhenLost: 1


# ORB params


ORBextractor.nFeatures: 2000
ORBextractor.scaleFactor: 1.2
ORBextractor.nLevels: 8
ORBextractor.iniThFAST: 15
ORBextractor.minThFAST: 5


# Viewer params


Viewer.KeyFrameSize: 0.05
Viewer.KeyFrameLineWidth: 1.0
Viewer.GraphLineWidth: 0.9
Viewer.PointSize: 2.0
Viewer.CameraSize: 0.08
Viewer.CameraLineWidth: 3.0
Viewer.ViewpointX: 0.0
Viewer.ViewpointY: -0.7
Viewer.ViewpointZ: -1.8
Viewer.ViewpointF: 500.0
